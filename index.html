<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario Grafana</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
    }
    .card {
        background: #1e293b;
        padding: 2rem;
        border-radius: 1rem;
        width: 100%;
        max-width: 550px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    h1, h2 { margin-top: 0; }
    .btn {
        background: #0284c7;
        padding: 1rem;
        border: none;
        width: 100%;
        border-radius: 0.5rem;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 1rem;
    }
    .btn:hover { background: #0ea5e9; }
    .option {
        background: rgba(255,255,255,0.08);
        padding: 1rem;
        border-radius: 0.5rem;
        margin-bottom: .5rem;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .option:hover {
        background: rgba(255,255,255,0.15);
    }
</style>
</head>

<body>

<div class="card" id="screen-start">
    <h1>Cuestionario Grafana</h1>
    <p>Introduce tu nombre:</p>
    <input type="text" id="player-name" 
           style="width:100%; padding:0.7rem; border-radius:.5rem;">
    <button class="btn" id="btn-start">Comenzar</button>
</div>

<div class="card hidden" id="screen-quiz">
    <h2 id="q-counter"></h2>
    <p id="q-text"></p>
    <div id="options"></div>
</div>

<div class="card hidden" id="screen-results">
    <h2>¡Resultados!</h2>
    <p>Puntuación: <span id="score"></span></p>
    <p>Aciertos: <span id="correct"></span> / 10</p>
    <button class="btn" onclick="location.reload()">Reintentar</button>
</div>

<script>
// ----------------------------
//   PREGUNTAS
// ----------------------------
const questions = [
{q:"¿Qué herramienta se usa para dashboards?", o:["Logstash","Kibana","Superset","Grafana"], a:3},
{q:"¿Qué destaca en Grafana?", o:["SQL only","Sin alertas","Múltiples fuentes","Solo logs"], a:2},
{q:"¿Qué puede mostrar Grafana?", o:["Solo logs","Solo CPU","Gráficos/tablas/etc","Solo red"], a:2},
{q:"Compatibilidad OS?", o:["Windows","Linux","Muchos sistemas","Android"], a:2},
{q:"Fuerte de Grafana?", o:["Audio","Reconocimiento","Multi-origen","Compilar"], a:2},
{q:"Grafana es:", o:["BD","Observabilidad","Servicio Cloud","Lenguaje"], a:1},
{q:"Característica:", o:["Encriptación","Alertas","Almacenamiento","ML"], a:1},
{q:"Plantilla:", o:["Estático","Variables","Fuente","PDF"], a:1},
{q:"Grafana vs Kibana?", o:["Métricas vs logs","Libre vs no","Visualiza vs ingesta","Iguales"], a:0},
{q:"Métricas:", o:["Cualitativos","Cuantitativos","Logs","Feedback"], a:1}
];

let index = 0;
let score = 0;
let correct = 0;

document.getElementById("btn-start").onclick = () => {
    const name = document.getElementById("player-name").value.trim();
    if (!name) return;

    document.getElementById("screen-start").classList.add("hidden");
    document.getElementById("screen-quiz").classList.remove("hidden");
    showQuestion();
};

function showQuestion(){
    if(index >= questions.length){
        return showResults();
    }

    const q = questions[index];
    document.getElementById("q-counter").textContent = 
        `Pregunta ${index+1} / ${questions.length}`;
    document.getElementById("q-text").textContent = q.q;

    const optBox = document.getElementById("options");
    optBox.innerHTML = "";

    q.o.forEach((text, i) => {
        const btn = document.createElement("div");
        btn.className = "option";
        btn.textContent = text;
        btn.onclick = () => checkAnswer(i);
        optBox.appendChild(btn);
    });
}

function checkAnswer(i){
    if(i === questions[index].a){
        score += 100;
        correct++;
    }
    index++;
    showQuestion();
}

function showResults(){
    document.getElementById("screen-quiz").classList.add("hidden");
    document.getElementById("screen-results").classList.remove("hidden");

    document.getElementById("score").textContent = score;
    document.getElementById("correct").textContent = correct;
}

// Helper
function $(id){ return document.getElementById(id); }
</script>

</body>
</html>
