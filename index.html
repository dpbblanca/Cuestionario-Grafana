<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana Mastery | Dashboard Trivia</title>
    
    <!-- Scripts externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --sky-500: #0ea5e9;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--slate-900);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .glass-card {
            background-color: var(--slate-800);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        .modern-btn {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            width: 100%;
            text-align: left;
            margin-bottom: 0.5rem;
            transition: 0.2s;
            color: white;
        }

        .modern-btn:hover {
            background-color: rgba(255,255,255,0.1);
            border-color: var(--sky-500);
        }

        .hidden { display: none !important; }

        #timer-progress {
            height: 6px;
            background-color: var(--sky-500);
            width: 100%;
            border-radius: 3px;
        }

        /* Estilos para la consola del profesor */
        .teacher-console {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- Pantalla de Inicio -->
        <div id="screen-start" class="glass-card text-center">
            <h1 class="text-3xl font-bold mb-4">Grafana Mastery</h1>
            <p class="text-gray-400 mb-6">Desafío de Observabilidad</p>
            <input type="text" id="player-name" placeholder="Escribe tu nombre" 
                class="w-full bg-black/30 border border-white/10 p-3 rounded-lg mb-4 text-center text-white focus:outline-none focus:border-sky-500">
            <button id="btn-start" class="w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-lg font-bold transition-colors">
                COMENZAR
            </button>
            <p class="mt-4 text-[10px] text-gray-500">Los resultados se guardarán automáticamente para el profesor.</p>
        </div>

        <!-- Pantalla de Juego -->
        <div id="screen-quiz" class="glass-card hidden">
            <div class="flex justify-between text-xs mb-4 text-gray-400 font-bold uppercase">
                <span id="q-counter">Pregunta 1/10</span>
                <span id="q-score">Puntos: 0</span>
            </div>
            <div class="w-full bg-gray-700 h-1.5 rounded-full mb-6">
                <div id="timer-progress"></div>
            </div>
            <h2 id="q-text" class="text-xl font-semibold mb-6">Cargando...</h2>
            <div id="options-container"></div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="screen-results" class="glass-card hidden text-center">
            <h2 class="text-2xl font-bold mb-6">Resultados Finales</h2>
            <div class="flex justify-around mb-8">
                <div class="text-center">
                    <div id="res-score" class="text-3xl font-bold text-sky-400">0</div>
                    <div class="text-xs text-gray-500">PUNTOS</div>
                </div>
                <div class="text-center">
                    <div id="res-acc" class="text-3xl font-bold text-purple-400">0%</div>
                    <div class="text-xs text-gray-500">ACIERTO</div>
                </div>
            </div>
            <div id="sync-status" class="text-xs text-gray-500 mb-4 italic">Enviando resultados...</div>
            <button onclick="location.reload()" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-lg font-bold transition-colors">
                REINTENTAR
            </button>
        </div>

        <!-- Consola del Profesor (Modal) -->
        <div id="screen-teacher" class="glass-card hidden fixed inset-0 z-50 overflow-y-auto m-4 lg:m-20 border-sky-500/50">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-sky-400">Panel del Profesor</h2>
                <button onclick="toggleTeacherConsole()" class="text-gray-400 hover:text-white">Cerrar</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-black/20 text-gray-400 uppercase text-[10px] tracking-widest">
                        <tr>
                            <th class="p-3">Alumno</th>
                            <th class="p-3">Puntuación</th>
                            <th class="p-3">Aciertos</th>
                            <th class="p-3">Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-data" class="divide-y divide-white/5">
                        <!-- Datos cargados desde Firestore -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Botón discreto para abrir consola del profesor -->
    <div class="teacher-console">
        <button onclick="toggleTeacherConsole()" class="w-10 h-10 bg-white/5 hover:bg-white/10 rounded-full flex items-center justify-center text-gray-600 hover:text-gray-300 transition-all text-xs" title="Consola del profesor">
            👨‍🏫
        </button>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de Firebase (inyectada por el entorno)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'grafana-trivia';

        let currentUser = null;

        // Inicializar Autenticación
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) listenForScores();
        });

        // Lógica del Cuestionario
        const questions = [
            { q: "¿Qué herramienta se utiliza principalmente para crear dashboards con múltiples orígenes de datos?", o: ["Logstash", "Kibana", "Apache Superset", "Grafana"], a: 3 },
            { q: "¿Qué característica destaca en Grafana?", o: ["Solo admite SQL", "No soporta alertas", "Datos de múltiples fuentes en un mismo dashboard", "Solo para logs de Apache"], a: 2 },
            { q: "¿Qué tipo de datos puede representar un dashboard en Grafana?", o: ["Solo logs", "Solo métricas de red", "Tablas, gráficos, mapas térmicos y más", "Solo SO"], a: 2 },
            { q: "¿Qué sistema operativo es compatible con Grafana?", o: ["Solo Windows", "Solo Linux", "Múltiples sistemas operativos", "Solo Android"], a: 2 },
            { q: "¿Cuál es uno de los puntos fuertes de Grafana?", o: ["Procesamiento de audio", "Reconocimiento facial", "Visualización simultánea de diferentes orígenes", "Compilación de scripts"], a: 2 },
            { q: "¿Qué es Grafana?", o: ["Gestor de BD", "Plataforma de código abierto para monitoreo y observabilidad", "Servicio Cloud", "Lenguaje de programación"], a: 1 },
            { q: "¿Cuál de las siguientes es una característica de Grafana?", o: ["Encriptación", "Alertas", "Almacenamiento masivo", "Machine Learning"], a: 1 },
            { q: "¿Qué es una plantilla de dashboard en Grafana?", o: ["Dashboard estático", "Dashboards interactivos con variables", "Creador de fuentes", "Exportador de PDF"], a: 1 },
            { q: "¿Principal diferencia entre Grafana y Kibana?", o: ["Grafana métricas, Kibana registros", "Grafana es libre, Kibana no", "Grafana visualiza, Kibana ingesta", "Son iguales"], a: 0 },
            { q: "¿Qué son las métricas en Grafana?", o: ["Datos cualitativos", "Mediciones cuantitativas en el tiempo", "Entradas de registros", "Feedback de usuarios"], a: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let correctAnswers = 0;
        let timer;
        let timeLeft = 15;
        let playerName = "";

        window.toggleTeacherConsole = () => {
            const consoleEl = document.getElementById('screen-teacher');
            consoleEl.classList.toggle('hidden');
        };

        const btnStart = document.getElementById('btn-start');
        btnStart.addEventListener('click', () => {
            playerName = document.getElementById('player-name').value.trim();
            if(!playerName) return alert("Por favor, introduce tu nombre");
            
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            showQuestion();
        });

        function showQuestion() {
            if(currentIdx >= questions.length) return showResults();

            const q = questions[currentIdx];
            document.getElementById('q-counter').innerText = `Pregunta ${currentIdx + 1}/${questions.length}`;
            document.getElementById('q-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'modern-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                container.appendChild(btn);
            });

            resetTimer();
        }

        function resetTimer() {
            timeLeft = 15;
            const bar = document.getElementById('timer-progress');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.transition = 'width 15s linear';
                bar.style.width = '0%';
            }, 50);

            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                if(timeLeft <= 0) checkAnswer(-1);
            }, 1000);
        }

        function checkAnswer(idx) {
            clearInterval(timer);
            const q = questions[currentIdx];
            if(idx === q.a) {
                score += 100 + (timeLeft * 5);
                correctAnswers++;
            }
            
            document.getElementById('q-score').innerText = `Puntos: ${score}`;
            currentIdx++;
            showQuestion();
        }

        async function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            document.getElementById('res-score').innerText = score;
            document.getElementById('res-acc').innerText = Math.round((correctAnswers / questions.length) * 100) + '%';

            // Guardar en Firestore
            if (currentUser) {
                const syncStatus = document.getElementById('sync-status');
                try {
                    const resultRef = doc(db, 'artifacts', appId, 'public', 'data', 'puntuaciones', currentUser.uid);
                    await setDoc(resultRef, {
                        nombre: playerName,
                        puntos: score,
                        aciertos: correctAnswers,
                        fecha: new Date().toISOString(),
                        userId: currentUser.uid
                    });
                    syncStatus.innerText = "✓ Resultados guardados para el profesor";
                    syncStatus.classList.add('text-green-500');
                } catch (error) {
                    console.error("Error guardando datos:", error);
                    syncStatus.innerText = "Error al sincronizar con el profesor.";
                }
            }
        }

        function listenForScores() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'puntuaciones'));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('leaderboard-data');
                tbody.innerHTML = '';
                
                // Convertir snapshot a array y ordenar manualmente por puntos (Regla 2)
                const data = [];
                snapshot.forEach(doc => data.push(doc.data()));
                data.sort((a, b) => b.puntos - a.puntos);

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/5 transition-colors";
                    const dateStr = new Date(item.fecha).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    tr.innerHTML = `
                        <td class="p-3 font-medium">${item.nombre}</td>
                        <td class="p-3 text-sky-400 font-bold">${item.puntos}</td>
                        <td class="p-3 text-gray-400">${item.aciertos}/10</td>
                        <td class="p-3 text-gray-500 text-xs">${dateStr}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }, (error) => {
                console.error("Error escuchando datos:", error);
            });
        }
    </script>
</body>
</html>
