<script>

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================
   CREAR TABLA SI NO EXISTE
================ */
async function ensureTable() {
  const { error } = await supabase.rpc("exec", {
    query: `
      create table if not exists public.scores (
        id uuid default gen_random_uuid() primary key,
        nombre text,
        puntos int,
        aciertos int,
        fecha timestamptz default now()
      );
    `
  });
}
ensureTable();

/* ==========================
  GUARDAR RESULTADO EN LA NUBE
===========================*/
async function saveToCloud(name, score, correct) {
  const status = document.getElementById("sync-status");

  const { error } = await supabase.from("scores").insert({
    nombre: name,
    puntos: score,
    aciertos: correct
  });

  if (error) {
    status.innerText = "❌ Error al sincronizar";
    status.style.color = "red";
  } else {
    status.innerText = "✓ Sincronizado correctamente";
    status.style.color = "#4ade80";
  }
}

/* ==========================
   LEER TABLA (polling)
==========================*/
async function loadLeaderboard() {
  const { data, error } = await supabase
    .from("scores")
    .select("*")
    .order("puntos", { ascending: false });

  if (!error) updateLeaderboardUI(data);
}

/* ==========================
   POLLING CADA 2 SEGUNDOS
==========================*/
setInterval(loadLeaderboard, 2000);

/* ==========================
   ACTUALIZAR TABLA PROFESOR
==========================*/
function updateLeaderboardUI(list) {
  const tbody = document.getElementById("leaderboard-data");
  tbody.innerHTML = "";

  list.forEach(entry => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="p-4">${entry.nombre}</td>
      <td class="p-4 text-sky-400 font-bold">${entry.puntos}</td>
      <td class="p-4">${entry.aciertos}/10</td>
      <td class="p-4">${new Date(entry.fecha).toLocaleString("es-ES")}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* ==========================
   LÓGICA DEL QUIZ
==========================*/

const questions = [
{ q:"¿Qué herramienta se usa para dashboards?", o:["Logstash","Kibana","Superset","Grafana"], a:3 },
{ q:"¿Qué destaca en Grafana?", o:["SQL only","Sin alertas","Múltiples fuentes","Solo logs"], a:2 },
{ q:"¿Qué puede mostrar Grafana?", o:["Solo logs","Solo CPU","Gráficos/tablas/etc","Solo red"], a:2 },
{ q:"Compatibilidad OS?", o:["Windows","Linux","Muchos sistemas","Android"], a:2 },
{ q:"Fuerte de Grafana?", o:["Audio","Reconocimiento","Visualización multi‑origen","Compilar"], a:2 },
{ q:"Grafana es:", o:["BD","Observabilidad","Servicio Cloud","Lenguaje"], a:1 },
{ q:"Característica:", o:["Encriptación","Alertas","Almacenamiento","ML"], a:1 },
{ q:"Plantilla de dashboard:", o:["Estático","Variables interactivas","Fuente","PDF"], a:1 },
{ q:"Grafana vs Kibana:", o:["Métricas vs logs","Libre vs no","Visualiza vs ingesta","Iguales"], a:0 },
{ q:"Métricas:", o:["Cualitativos","Cuantitativos con tiempo","Logs","Feedback"], a:1 }
];

let idx = 0, score = 0, correct = 0, timer, timeLeft = 15, playerName = "";

/* ---------------------- */
document.getElementById("btn-start").onclick = () => {
  playerName = document.getElementById("player-name").value.trim();
  if (!playerName) return;

  document.getElementById("screen-start").classList.add("hidden");
  document.getElementById("screen-quiz").classList.remove("hidden");
  showQuestion();
};

function showQuestion() {
  if (idx >= questions.length) return showResults();
  const q = questions[idx];

  document.getElementById("q-counter").innerText = `Pregunta ${idx+1}/10`;
  document.getElementById("q-text").innerText = q.q;

  const cont = document.getElementById("options-container");
  cont.innerHTML = "";

  q.o.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "modern-btn";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(i);
    cont.appendChild(btn);
  });

  resetTimer();
}

function resetTimer() {
  timeLeft = 15;
  const bar = document.getElementById("timer-progress");
  bar.style.transition = "none";
  bar.style.width = "100%";

  setTimeout(() => {
    bar.style.transition = "width 15s linear";
    bar.style.width = "0%";
  }, 50);

  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) checkAnswer(-1);
  }, 1000);
}

function checkAnswer(answerIdx) {
  clearInterval(timer);
  const q = questions[idx];

  if (answerIdx === q.a) {
    score += 100 + timeLeft * 5;
    correct++;
  }

  document.getElementById("q-score").innerText = `Puntos: ${score}`;
  idx++;
  showQuestion();
}

function toggleTeacherConsole() {
  const modal = document.getElementById("modal-teacher");
  modal.classList.toggle("hidden");
  if (!modal.classList.contains("hidden")) loadLeaderboard();
}

async function showResults() {
  document.getElementById("screen-quiz").classList.add("hidden");
  document.getElementById("screen-results").classList.remove("hidden");

  document.getElementById("res-score").innerText = score;
  document.getElementById("res-acc").innerText = Math.round(correct / 10 * 100) + "%";

  await saveToCloud(playerName, score, correct);
}

</script>
